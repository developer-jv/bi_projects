x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: ${AIRFLOW_IMAGE_NAME:-custom-airflow:3.1.1}
  env_file:
    - .env
    - .env.airflow
    - ../.env
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CORE__DAG_DISCOVERY_SAFE_MODE: "False"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_USERS: "admin:admin,bi:user,analyst:viewer"
    AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_PASSWORDS_FILE: "/opt/airflow/auth/simple_auth_passwords.json"
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-api-server:8080/execution/"
    AIRFLOW__API_AUTH__JWT_SECRET: "${JWT_SECRET}"
    AIRFLOW__WEBSERVER__SECRET_KEY: "${SECRET_KEY}"
    AIRFLOW__API__SECRET_KEY: "${SECRET_KEY}"
    AIRFLOW__CORE__FERNET_KEY: "${FERNET_KEY}"
    AIRFLOW__API__BASE_URL: "http://airflow-api-server:8080"
    AIRFLOW__API__EXPOSE_CONFIG: "True"
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    PYTHONPATH: "/opt/lakehouse"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./auth:/opt/airflow/auth
    - ../pipeline:/opt/lakehouse/pipeline
  user: "${AIRFLOW_UID}:0"
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_started
  networks: [airflow-net]

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5
    networks: [airflow-net]

  redis:
    image: redis:7-alpine
    networks: [airflow-net]

  airflow-init:
    <<: *airflow-common
    command: airflow db migrate

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    ports:
      - "8083:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-worker:
    <<: *airflow-common
    command: celery worker

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer

volumes:
  postgres-db-volume:

networks:
  airflow-net:
